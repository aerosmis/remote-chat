<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat</title>

<style>

body::before {
    content: "";
    position: fixed;
    inset: 0;

    background: url("/static/bg4.gif");
    background-size: cover;
    background-position: center;

    filter: blur(6px); /* 👈 flou uniquement sur le fond */
    transform: scale(1.05);

    z-index: -1;

    body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: -1;
}

}

body {
    margin: 0;
    font-family: Arial;
    background: url("/static/bg4.gif");
    color: rgb(255, 255, 255);

    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* HEADER */
.header {
    position: sticky;
    top: 0;
    z-index: 10;

    padding: 12px;
    text-align: center;
    font-size: 16px;
    color: white;
    text-shadow: 0 0 10px rgba(255,255,255,0.4);

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px) saturate(180%);
    -webkit-backdrop-filter: blur(15px) saturate(180%);
    

    border-bottom: 1px solid rgba(255,255,255,0.15);

    box-shadow: 
        0 4px 20px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.2);
}

/* statut */
.status {
    font-size: 12px;
    margin-top: 4px;
    opacity: 0.7;
}

/* point vert stylé */
.status::before {
    content: "";
    display: inline-block;
    width: 8px;
    height: 8px;
    margin-right: 6px;

    border-radius: 50%;
    background: #00ff88;

    box-shadow: 0 0 8px #00ff88;
}

/* CHAT */
#chat {
    
    overflow-y: auto;
    padding: 10px;
    padding-bottom: 80px; /* 👈 IMPORTANT */
    display: flex;
    flex-direction: column;
    overflow-x: hidden; /* 👈 enlève la barre chelou */
}

/* MESSAGES */
.message {
    max-width: 70%;
    padding: 12px;
    margin: 5px;
    border-radius: 15px;
    font-size: 14px;

    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255, 255, 255, 0.15);

    animation: sendAnim 0.25s ease;
    word-wrap: break-word;
    overflow-wrap: break-word;
    word-break: break-word;
}

@keyframes sendAnim {
    from {
        opacity: 0;
        transform: translateY(10px) scale(0.98);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }

}

.me {
    align-self: flex-end;

    background: rgba(255, 255, 255, 0.212);
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.164);

    align-self: flex-end;
    background: rgba(255, 255, 255, 0.212);
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.164);

    animation: sendRight 0.2s ease;
}

@keyframes sendRight {
    from {
        transform: translateX(10px); /* 👈 moins violent */
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }

}

.other {
    align-self: flex-start;

    background: rgba(255,255,255,0.1);
}

/* INPUT BAR (style WhatsApp) */
.input-bar {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    gap: 8px;

    padding: 10px;
    box-sizing: border-box;

    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    border-top: 1px solid rgba(255,255,255,0.1);
}

.name {
    font-weight: bold;
    color: white;
    text-shadow: 0 0 8px rgba(255,255,255,0.6);
}

.time {
    font-size: 10px;
    opacity: 0.5;
    margin-left: 8px;
}

.msg-text {
    font-size: 14px;
    line-height: 1.4;
}

.msg-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
}

#msg {
    flex: 1;
    padding: 12px;

    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);

    color: white;
    outline: none;
}

button {
    width: 44px;
    height: 44px;

    border-radius: 50%;
    border: none;

    display: flex;
    align-items: center;
    justify-content: center;

    background: linear-gradient(135deg, #375a796b, #2d9aa162);
    color: white;
    font-size: 18px;

    cursor: pointer;
    transition: all 0.2s ease;

    box-shadow: 
        0 4px 15px rgba(41, 82, 112, 0.5),
        inset 0 1px 0 rgba(255,255,255,0.3);
}

button:hover {
    transform: scale(1.08);
    box-shadow: 
        0 6px 20px rgba(51, 94, 124, 0.7),
        inset 0 1px 0 rgba(255,255,255,0.4);
}

button.sending {
    animation: sendPulse 0.25s ease;
}

@keyframes sendPulse {
    0% {
        transform: scale(1);
    }
    50% {
        transform: scale(0.85);
    }
    100% {
        transform: scale(1);
    }
}

button:active {
    transform: scale(0.95);
}

#drawBox {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);

    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(20px);

    padding: 15px;
    border-radius: 20px;

    display: none;
    flex-direction: column;
    align-items: center;

    z-index: 999;
}

#canvas {
    background: rgba(255, 255, 255, 0.103);
    border-radius: 10px;
    cursor: crosshair;
}

.draw-controls {
    margin-top: 10px;
    display: flex;
    gap: 10px;
}

#drawBox {
    display: none;
}

.color-btn {
    width: 44px;
    height: 44px;

    border-radius: 50%;
    border: none;

    display: flex;
    align-items: center;
    justify-content: center;

    background: linear-gradient(135deg, #375a796b, #2d9aa162);
    backdrop-filter: blur(10px);

    color: white;
    font-size: 16px;

    cursor: pointer;
    transition: all 0.2s ease;

    box-shadow: 
        0 4px 15px rgba(41, 82, 112, 0.5),
        inset 0 1px 0 rgba(255,255,255,0.3);

    position: relative;
    overflow: hidden;
}

/* cache input */
.color-btn input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
}

/* hover identique */
.color-btn:hover {
    transform: scale(1.08);
    box-shadow: 
        0 6px 20px rgba(51, 94, 124, 0.7),
        inset 0 1px 0 rgba(255,255,255,0.4);
}

.chat-img {
    max-width: 200px;
    border-radius: 12px;
    margin-top: 6px;

    border: 1px solid rgba(255,255,255,0.15);

    box-shadow: 
        0 4px 15px rgba(0,0,0,0.3),
        0 0 10px rgba(255,255,255,0.1);
}

.avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    margin-right: 6px;

    box-shadow: 0 0 8px rgba(255,255,255,0.4);
}

</style>
</head>

<div class="header">
    FAMILIA - {{ session.user }}
    <div class="status" id="status">0 en ligne</div>
</div>

<div id="chat"></div>

<div class="input-bar">
    <button onclick="openDraw()">✎</button>
    <input id="msg" placeholder="Message...">
    <button id="sendBtn" disabled>➤</button>
</div>

<!-- DRAW -->
<div id="drawBox">
    <canvas id="canvas" width="300" height="300"></canvas>

    <div class="draw-controls">
        <label class="color-btn">
            ✽
            <input type="color" id="colorPicker">
        </label>
    
        <button onclick="sendDrawing()">➤</button>
        <button onclick="clearCanvas()">🧽</button>
        <button onclick="closeDraw()">✖</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
let socket = io();
let chat = document.getElementById("chat");

let input = document.getElementById("msg");
let btn = document.getElementById("sendBtn");
let myAvatar = "{{ session.avatar }}";

/* ===== CHAT ===== */

function displayMessage(data){
    let parts = data.split("|");

    let time, name, avatar, msg;

    if(parts.length === 4){
        time = parts[0];
        name = parts[1];
        avatar = parts[2];
        msg = parts[3];
    } else if(parts.length === 3){
        time = parts[0];
        name = parts[1];
        avatar = "default.png";
        msg = parts[2];
    } else {
        time = "";
        name = parts[0];
        avatar = "default.png";
        msg = parts[1];
    }

    let div = document.createElement("div");
    div.classList.add("message");

    if(name === "{{ session.user }}"){
        div.classList.add("me");
    } else {
        div.classList.add("other");
    }

    let content;

    if(msg && msg.startsWith("[img]")){
        let imgData = msg.replace("[img]", "");
        content = `<img src="${imgData}" class="chat-img">`;
    } else {
        content = `<div class="msg-text">${msg}</div>`;
    }

    div.innerHTML = `
        <div class="msg-header">
            <img src="/static/avatars/${avatar}" class="avatar">
            <span class="name">${name}</span>
            <span class="time">${time}</span>
        </div>
        ${content}
    `;

    chat.appendChild(div);
}


/* SEND MESSAGE */
function send(){
    let msg = input.value;
    if(msg.trim() === "") return;

    socket.send(msg);
    input.value = "";
    btn.disabled = true;
}

btn.onclick = send;

input.addEventListener("input", () => {
    btn.disabled = input.value.trim() === "";
});

input.addEventListener("keypress", (e) => {
    if(e.key === "Enter") send();
});

/* SOCKET */
socket.on("message", (data) => {
    displayMessage(data);
    chat.scrollTop = chat.scrollHeight;
});

socket.on("history", (messages) => {
    chat.innerHTML = "";
    messages.forEach(displayMessage);
});

socket.on("users", (list) => {
    document.getElementById("status").innerText = list.length + " en ligne";
});

/* ===== DRAW ===== */

function sendDrawing(){
    let dataURL = canvas.toDataURL("image/png"); // transparent OK

    socket.emit("image", dataURL);

    clearCanvas();
    closeDraw();
}

function openDraw(){
    document.getElementById("drawBox").style.display = "flex";
}

function closeDraw(){
    document.getElementById("drawBox").style.display = "none";
}

window.onload = function(){

    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");

    let colorPicker = document.getElementById("colorPicker");
    let currentColor = "#000000";

    let drawing = false;

    colorPicker.addEventListener("input", () => {
        currentColor = colorPicker.value;
        
        document.querySelector(".color-btn").style.background = currentColor;
    });

    /* MOUSE */
    canvas.addEventListener("mousedown", () => drawing = true);
    canvas.addEventListener("mouseup", () => {
        drawing = false;
        ctx.beginPath();
    });
    canvas.addEventListener("mousemove", draw);

    /* TOUCH */
    canvas.addEventListener("touchstart", () => drawing = true);
    canvas.addEventListener("touchend", () => {
        drawing = false;
        ctx.beginPath();
    });
    canvas.addEventListener("touchmove", drawTouch);

    function draw(e){
        if(!drawing) return;

        ctx.strokeStyle = currentColor;
        ctx.lineWidth = 3;
        ctx.lineCap = "round";

        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(e.offsetX, e.offsetY);
    }

    function drawTouch(e){
        if(!drawing) return;

        e.preventDefault();

        let rect = canvas.getBoundingClientRect();
        let touch = e.touches[0];

        let x = touch.clientX - rect.left;
        let y = touch.clientY - rect.top;

        ctx.strokeStyle = currentColor;
        ctx.lineWidth = 3;
        ctx.lineCap = "round";

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    window.clearCanvas = function(){
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    window.sendDrawing = function(){
        let dataURL = canvas.toDataURL("image/png");
        socket.emit("image", dataURL);

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        closeDraw();
    }
};
</script>

</body>
</html>
