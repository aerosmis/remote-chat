<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat</title>

<style>

body::before {
    content: "";
    position: fixed;
    inset: 0;

    background: url("/static/bg4.gif");
    background-size: cover;
    background-position: center;

    filter: blur(6px); /* 👈 flou uniquement sur le fond */
    transform: scale(1.05);

    z-index: -1;

    body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: -1;
}

}

body {
    margin: 0;
    font-family: Arial;
    background: url("/static/bg4.gif");
    color: rgb(255, 255, 255);

    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* HEADER */
.header {
    position: sticky;
    top: 0;
    z-index: 10;

    padding: 12px;
    text-align: center;
    font-size: 16px;
    color: white;
    text-shadow: 0 0 10px rgba(255,255,255,0.4);
    

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px) saturate(180%);
    -webkit-backdrop-filter: blur(15px) saturate(180%);
    

    border-bottom: 1px solid rgba(255,255,255,0.15);

    box-shadow: 
        0 4px 20px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.2);
}

/* statut */
.status {
    font-size: 12px;
    margin-top: 4px;
    opacity: 0.7;
}

/* point vert stylé */
.status::before {
    content: "";
    display: inline-block;
    width: 8px;
    height: 8px;
    margin-right: 6px;

    border-radius: 50%;
    background: #00ff88;

    box-shadow: 0 0 8px #00ff88;
}

/* CHAT */
#chat {
    
    overflow-y: auto;
    padding: 10px;
    padding-bottom: 80px; /* 👈 IMPORTANT */
    display: flex;
    flex-direction: column;
    overflow-x: hidden; /* 👈 enlève la barre chelou */
}

.msg-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    max-width: 80%;
    margin: 5px 10px;
}
.msg-wrap.me {
    align-self: flex-end;
    flex-direction: row-reverse;
}
.msg-wrap.other {
    align-self: flex-start;
}
.bubble {
    padding: 10px 13px;
    border-radius: 16px;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    animation: sendAnim 0.25s ease;
    word-wrap: break-word;
    overflow-wrap: break-word;
}
.me .bubble {
    background: rgba(255,255,255,0.212);
    box-shadow: 0 0 15px rgba(255,255,255,0.164);
    border-radius: 16px 4px 16px 16px;
}
.bubble-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 4px;
}

@keyframes sendAnim {
    from {
        opacity: 0;
        transform: translateY(10px) scale(0.98);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }

}

.name {
    font-weight: bold;
    font-size: 12px;
    color: white;
    text-shadow: 0 0 8px rgba(255,255,255,0.6);
}

@keyframes sendRight {
    from {
        transform: translateX(10px); /* 👈 moins violent */
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }

}


/* INPUT BAR (style WhatsApp) */
.input-bar {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    gap: 8px;

    padding: 10px;
    box-sizing: border-box;

    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    border-top: 1px solid rgba(255,255,255,0.1);
}
.time {
    font-size: 10px;
    opacity: 0.5;
    white-space: nowrap;
}

.msg-text {
    font-size: 14px;
    line-height: 1.4;
}


#msg {
    flex: 1;
    padding: 12px;

    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);

    color: white;
    outline: none;
}

button {
    width: 44px;
    height: 44px;

    border-radius: 50%;
    border: none;

    display: flex;
    align-items: center;
    justify-content: center;

    background: linear-gradient(135deg, #375a796b, #2d9aa162);
    color: white;
    font-size: 18px;

    cursor: pointer;
    transition: all 0.2s ease;

    box-shadow: 
        0 4px 15px rgba(41, 82, 112, 0.5),
        inset 0 1px 0 rgba(255,255,255,0.3);
}

button:hover {
    transform: scale(1.08);
    box-shadow: 
        0 6px 20px rgba(51, 94, 124, 0.7),
        inset 0 1px 0 rgba(255,255,255,0.4);
}

button.sending {
    animation: sendPulse 0.25s ease;
}

@keyframes sendPulse {
    0% {
        transform: scale(1);
    }
    50% {
        transform: scale(0.85);
    }
    100% {
        transform: scale(1);
    }
}

button:active {
    transform: scale(0.95);
}

#drawBox {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);

    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(20px);

    padding: 15px;
    border-radius: 20px;

    display: none;
    flex-direction: column;
    align-items: center;

    z-index: 999;
}

#canvas {
    background: rgba(255, 255, 255, 0.103);
    border-radius: 10px;
    cursor: crosshair;
}

.draw-controls {
    margin-top: 10px;
    display: flex;
    gap: 10px;
}

#drawBox {
    display: none;
}

.color-btn {
    width: 44px;
    height: 44px;

    border-radius: 50%;
    border: none;

    display: flex;
    align-items: center;
    justify-content: center;

    background: linear-gradient(135deg, #375a796b, #2d9aa162);
    backdrop-filter: blur(10px);

    color: white;
    font-size: 16px;

    cursor: pointer;
    transition: all 0.2s ease;

    box-shadow: 
        0 4px 15px rgba(41, 82, 112, 0.5),
        inset 0 1px 0 rgba(255,255,255,0.3);

    position: relative;
    overflow: hidden;
}

/* cache input */
.color-btn input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
}

/* hover identique */
.color-btn:hover {
    transform: scale(1.08);
    box-shadow: 
        0 6px 20px rgba(51, 94, 124, 0.7),
        inset 0 1px 0 rgba(255,255,255,0.4);
}

.chat-img {
    max-width: 200px;
    border-radius: 12px;
    margin-top: 6px;

    border: 1px solid rgba(255,255,255,0.15);

    box-shadow: 
        0 4px 15px rgba(0,0,0,0.3),
        0 0 10px rgba(255,255,255,0.1);
}

.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    flex-shrink: 0;
    
}

/* ===== REACTIONS ===== */
.reactions {
    position: absolute;
    bottom: -14px;
    right: 8px;
    display: flex;
    gap: 3px;
    z-index: 5;
}
.msg-wrap.other .reactions {
    right: auto;
    left: 8px;
}
.reaction-badge {
    background: rgba(30,30,30,0.75);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 2px 6px;
    font-size: 13px;
    cursor: pointer;
    transition: transform 0.15s ease;
    display: flex;
    align-items: center;
    gap: 3px;
}
.reaction-badge:hover {
    transform: scale(1.2);
}
.reaction-badge .count {
    font-size: 10px;
    color: rgba(255,255,255,0.7);
}

/* Picker d'emojis */
.emoji-picker {
    position: absolute;
    bottom: 110%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,20,20,0.85);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 30px;
    padding: 8px 12px;
    display: none;
    gap: 8px;
    z-index: 100;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
.emoji-picker.open {
    display: flex;
    animation: popIn 0.2s ease;
}
@keyframes popIn {
    from { opacity: 0; transform: translateX(-50%) scale(0.8); }
    to   { opacity: 1; transform: translateX(-50%) scale(1); }
}
.emoji-picker span {
    font-size: 22px;
    cursor: pointer;
    transition: transform 0.15s ease;
}
.emoji-picker span:hover {
    transform: scale(1.35);
}

/* bulle en position relative pour que les reactions se positionnent */
.bubble {
    position: relative;
}
.msg-wrap {
    position: relative;
    margin-bottom: 14px; /* espace pour les reactions */
}

</style>
</head>

<div class="header">
    FAMILIA - {{ session.user }}
    <div class="status" id="status">0 en ligne</div>
</div>

<div id="chat"></div>

<div class="input-bar">
    <button onclick="openDraw()">✎</button>
    <input id="msg" placeholder="Message...">
    <button id="sendBtn" disabled>➤</button>
</div>

<!-- DRAW -->
<div id="drawBox">
    <canvas id="canvas" width="300" height="300"></canvas>

    <div class="draw-controls">
        <label class="color-btn">
            ✽
            <input type="color" id="colorPicker">
        </label>
    
        <button onclick="sendDrawing()">➤</button>
        <button onclick="clearCanvas()">🧽</button>
        <button onclick="closeDraw()">✖</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
let socket = io();
let chat = document.getElementById("chat");

let input = document.getElementById("msg");
let btn = document.getElementById("sendBtn");
let myAvatar = "{{ session.avatar }}";

/* ===== CHAT ===== */

function displayMessage(data) {
    let parts = data.split("|");
    let time, name, avatar, msg;

    if (parts.length === 4) {
        time = parts[0]; name = parts[1]; avatar = parts[2]; msg = parts[3];
    } else if (parts.length === 3) {
        time = parts[0]; name = parts[1]; avatar = "default.png"; msg = parts[2];
    } else {
        time = ""; name = parts[0]; avatar = "default.png"; msg = parts[1];
    }

    // ID unique basé sur le timestamp + nom
    let msgId = `${time}-${name}`.replace(/[^a-zA-Z0-9-]/g, "");

    let wrap = document.createElement("div");
    wrap.classList.add("msg-wrap");
    wrap.classList.add(name === "{{ session.user }}" ? "me" : "other");
    wrap.dataset.msgId = msgId;

    let content;
    if (msg && msg.startsWith("[img]")) {
        let imgData = msg.replace("[img]", "");
        content = `<img src="${imgData}" class="chat-img">`;
    } else {
        content = `<div class="msg-text">${msg}</div>`;
    }

    const EMOJIS = ["❤️", "😂", "😮", "😢", "😡", "👍"];

    wrap.innerHTML = `
        <img src="/static/avatars/${avatar}" class="avatar">
        <div class="bubble">
            <div class="bubble-header">
                <span class="name">${name}</span>
                <span class="time">${time}</span>
            </div>
            ${content}
            <div class="emoji-picker" id="picker-${msgId}">
                ${EMOJIS.map(e => `<span onclick="sendReaction('${msgId}', '${e}')">${e}</span>`).join("")}
            </div>
            <div class="reactions" id="reactions-${msgId}"></div>
        </div>
    `;

    // Long press
    let pressTimer;
    wrap.addEventListener("mousedown", () => {
        pressTimer = setTimeout(() => togglePicker(msgId), 500);
    });
    wrap.addEventListener("mouseup", () => clearTimeout(pressTimer));
    wrap.addEventListener("touchstart", () => {
        pressTimer = setTimeout(() => togglePicker(msgId), 500);
    });
    wrap.addEventListener("touchend", () => clearTimeout(pressTimer));

    // Double tap
    let lastTap = 0;
    wrap.addEventListener("touchend", () => {
        let now = Date.now();
        if (now - lastTap < 300) togglePicker(msgId);
        lastTap = now;
    });
    wrap.addEventListener("dblclick", () => togglePicker(msgId));

    chat.appendChild(wrap);
}

function togglePicker(msgId) {
    // ferme tous les autres
    document.querySelectorAll(".emoji-picker").forEach(p => p.classList.remove("open"));
    let picker = document.getElementById(`picker-${msgId}`);
    if (picker) picker.classList.toggle("open");
}

// Ferme le picker si on clique ailleurs
document.addEventListener("click", (e) => {
    if (!e.target.closest(".bubble")) {
        document.querySelectorAll(".emoji-picker").forEach(p => p.classList.remove("open"));
    }
});

function sendReaction(msgId, emoji) {
    socket.emit("reaction", { msg_id: msgId, emoji: emoji, user: "{{ session.user }}" });
    document.querySelectorAll(".emoji-picker").forEach(p => p.classList.remove("open"));
}

let pendingReactions = null;

socket.on("history", (messages) => {
    chat.innerHTML = "";
    messages.forEach(displayMessage);
    chat.scrollTop = chat.scrollHeight;

    if (pendingReactions) {
        applyReactions(pendingReactions);
        pendingReactions = null;
    }
});

socket.on("reactions_history", (allReactions) => {
    let firstBubble = document.querySelector(".bubble");
    if (firstBubble) {
        applyReactions(allReactions);
    } else {
        pendingReactions = allReactions;
    }
});

function applyReactions(allReactions) {
    for (let msgId in allReactions) {
        let reactionsDiv = document.getElementById(`reactions-${msgId}`);
        if (!reactionsDiv) continue;
        reactionsDiv.innerHTML = "";
        for (let emoji in allReactions[msgId]) {
            let count = allReactions[msgId][emoji];
            let badge = document.createElement("div");
            badge.classList.add("reaction-badge");
            badge.dataset.emoji = emoji;
            badge.innerHTML = `${emoji}<span class="count">${count > 1 ? count : ""}</span>`;
            badge.onclick = () => sendReaction(msgId, emoji);
            reactionsDiv.appendChild(badge);
        }
    }
}

socket.on("reaction", (data) => {
    let reactionsDiv = document.getElementById(`reactions-${data.msg_id}`);
    if (!reactionsDiv) return;

    let existing = reactionsDiv.querySelector(`[data-emoji="${data.emoji}"]`);
    if (existing) {
        let count = parseInt(existing.querySelector(".count").innerText || "1") + 1;
        existing.querySelector(".count").innerText = count > 1 ? count : "";
    } else {
        let badge = document.createElement("div");
        badge.classList.add("reaction-badge");
        badge.dataset.emoji = data.emoji;
        badge.innerHTML = `${data.emoji}<span class="count"></span>`;
        badge.onclick = () => sendReaction(data.msg_id, data.emoji);
        reactionsDiv.appendChild(badge);
    }
});


/* SEND MESSAGE */
function send(){
    let msg = input.value;
    if(msg.trim() === "") return;

    socket.send(msg);
    input.value = "";
    btn.disabled = true;
}

btn.onclick = send;

input.addEventListener("input", () => {
    btn.disabled = input.value.trim() === "";
});

input.addEventListener("keypress", (e) => {
    if(e.key === "Enter") send();
});

/* SOCKET */
socket.on("message", (data) => {
    displayMessage(data);
    chat.scrollTop = chat.scrollHeight;
});

socket.on("history", (messages) => {
    chat.innerHTML = "";
    messages.forEach(displayMessage);
});

socket.on("users", (list) => {
    document.getElementById("status").innerText = list.length + " en ligne";
});

/* ===== DRAW ===== */

function sendDrawing(){
    let dataURL = canvas.toDataURL("image/png"); // transparent OK

    socket.emit("image", dataURL);

    clearCanvas();
    closeDraw();
}

function openDraw(){
    document.getElementById("drawBox").style.display = "flex";
}

function closeDraw(){
    document.getElementById("drawBox").style.display = "none";
}

window.onload = function(){

    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");

    let colorPicker = document.getElementById("colorPicker");
    let currentColor = "#000000";

    let drawing = false;

    colorPicker.addEventListener("input", () => {
        currentColor = colorPicker.value;
        
        document.querySelector(".color-btn").style.background = currentColor;
    });

    /* MOUSE */
    canvas.addEventListener("mousedown", () => drawing = true);
    canvas.addEventListener("mouseup", () => {
        drawing = false;
        ctx.beginPath();
    });
    canvas.addEventListener("mousemove", draw);

    /* TOUCH */
    canvas.addEventListener("touchstart", () => drawing = true);
    canvas.addEventListener("touchend", () => {
        drawing = false;
        ctx.beginPath();
    });
    canvas.addEventListener("touchmove", drawTouch);

    function draw(e){
        if(!drawing) return;

        ctx.strokeStyle = currentColor;
        ctx.lineWidth = 3;
        ctx.lineCap = "round";

        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(e.offsetX, e.offsetY);
    }

    function drawTouch(e){
        if(!drawing) return;

        e.preventDefault();

        let rect = canvas.getBoundingClientRect();
        let touch = e.touches[0];

        let x = touch.clientX - rect.left;
        let y = touch.clientY - rect.top;

        ctx.strokeStyle = currentColor;
        ctx.lineWidth = 3;
        ctx.lineCap = "round";

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    window.clearCanvas = function(){
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    window.sendDrawing = function(){
        let dataURL = canvas.toDataURL("image/png");
        socket.emit("image", dataURL);

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        closeDraw();
    }
};
</script>

</body>
</html>
