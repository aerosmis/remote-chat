<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat</title>

<style>

body::before {
    content: "";
    position: fixed;
    inset: 0;

    background: url("/static/bg4.gif");
    background-size: cover;
    background-position: center;

    filter: blur(6px); /* 👈 flou uniquement sur le fond */
    transform: scale(1.05);

    z-index: -1;

    body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: -1;
}

}

body {
    margin: 0;
    font-family: Arial;
    background: url("/static/bg4.gif");
    color: rgb(255, 255, 255);

    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* HEADER */
.header {
    position: sticky;
    top: 0;
    z-index: 10;

    padding: 12px;
    text-align: center;
    font-size: 16px;
    color: white;
    text-shadow: 0 0 10px rgba(255,255,255,0.4);

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px) saturate(180%);
    -webkit-backdrop-filter: blur(15px) saturate(180%);
    

    border-bottom: 1px solid rgba(255,255,255,0.15);

    box-shadow: 
        0 4px 20px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.2);
}

/* statut */
.status {
    font-size: 12px;
    margin-top: 4px;
    opacity: 0.7;
}

/* point vert stylé */
.status::before {
    content: "";
    display: inline-block;
    width: 8px;
    height: 8px;
    margin-right: 6px;

    border-radius: 50%;
    background: #00ff88;

    box-shadow: 0 0 8px #00ff88;
}

/* CHAT */
#chat {
    
    overflow-y: auto;
    padding: 10px;
    padding-bottom: 80px; /* 👈 IMPORTANT */
    display: flex;
    flex-direction: column;
    overflow-x: hidden; /* 👈 enlève la barre chelou */
}

/* MESSAGES */
.message {
    max-width: 70%;
    padding: 12px;
    margin: 5px;
    border-radius: 15px;
    font-size: 14px;

    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255, 255, 255, 0.15);

    animation: sendAnim 0.25s ease;
}

@keyframes sendAnim {
    from {
        opacity: 0;
        transform: translateY(10px) scale(0.98);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }

}

.me {
    align-self: flex-end;

    background: rgba(255, 255, 255, 0.212);
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.164);

    align-self: flex-end;
    background: rgba(255, 255, 255, 0.212);
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.164);

    animation: sendRight 0.2s ease;
}

@keyframes sendRight {
    from {
        transform: translateX(10px); /* 👈 moins violent */
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }

}

.other {
    align-self: flex-start;

    background: rgba(255,255,255,0.1);
}

/* INPUT BAR (style WhatsApp) */
.input-bar {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    gap: 8px;

    padding: 10px;
    box-sizing: border-box;

    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    border-top: 1px solid rgba(255,255,255,0.1);
}

.name {
    font-weight: bold;
    color: white;
    text-shadow: 0 0 8px rgba(255,255,255,0.6);
}

.time {
    font-size: 10px;
    opacity: 0.5;
    margin-left: 8px;
}

.msg-text {
    font-size: 14px;
    line-height: 1.4;
}

.msg-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
}

#msg {
    flex: 1;
    padding: 12px;

    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);

    color: white;
    outline: none;
}

button {
    width: 44px;
    height: 44px;

    border-radius: 50%;
    border: none;

    display: flex;
    align-items: center;
    justify-content: center;

    background: linear-gradient(135deg, #375a796b, #2d9aa162);
    color: white;
    font-size: 18px;

    cursor: pointer;
    transition: all 0.2s ease;

    box-shadow: 
        0 4px 15px rgba(41, 82, 112, 0.5),
        inset 0 1px 0 rgba(255,255,255,0.3);
}

button:hover {
    transform: scale(1.08);
    box-shadow: 
        0 6px 20px rgba(51, 94, 124, 0.7),
        inset 0 1px 0 rgba(255,255,255,0.4);
}

button.sending {
    animation: sendPulse 0.25s ease;
}

@keyframes sendPulse {
    0% {
        transform: scale(1);
    }
    50% {
        transform: scale(0.85);
    }
    100% {
        transform: scale(1);
    }
}

button:active {
    transform: scale(0.95);
}


</style>
</head>

<body>

    <div class="header">
        FAMILIA - {{ session.user }}
        <div class="status" id="status">0 en ligne</div>
    </div>

<style>
    #onlineUsers {
        font-size: 12px;
        color: #67c200;
        text-align: center;
        margin-bottom: 5px;
    }
    </style>



<div id="chat"></div>


<div class="input-bar">
    <input id="msg" placeholder="Message..." onkeypress="if(event.key==='Enter') send()">
    <button id="sendBtn" onclick="send()" disabled>➤</button>
</div>

<!-- Demande du nom UNE FOIS -->

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
  var socket = io();
var chat = document.getElementById("chat");

let input = document.getElementById("msg");
let btn = document.getElementById("sendBtn");

function displayMessage(data){
    let parts = data.split("|");

    let time, name, msg;

    if(parts.length === 3){
        // nouveau format
        time = parts[0];
        name = parts[1];
        msg = parts[2];
    } else {
        // ancien format
        time = "";
        name = parts[0];
        msg = parts[1];
    }

    let div = document.createElement("div");
    div.classList.add("message");

    let myName = "{{ session.user }}";

    if(name === myName){
        div.classList.add("me");
    } else {
        div.classList.add("other");
    }

    div.innerHTML = `
        <div class="msg-header">
            <span class="name">${name}</span>
            <span class="time">${time}</span>
        </div>
        <div class="msg-text">${msg}</div>
    `;

    chat.appendChild(div);
}

/* SEND */
function send(){
    let msg = input.value;
    if(msg.trim() === "") return;

    socket.send(msg);
    input.value = "";

    btn.disabled = true;
}

/* ACTIVER BOUTON */
input.addEventListener("input", function(){
    btn.disabled = input.value.trim() === "";
});


    
    /* USERS ONLINE */
    socket.on('users', function(list){
    document.getElementById("status").innerText = list.length + " en ligne";
    });

    /* MESSAGE LIVE */
socket.on("message", function(data){
    displayMessage(data);
    chat.scrollTop = chat.scrollHeight;
});

/* HISTORIQUE */
socket.on("history", function(messages){
    chat.innerHTML = "";

    messages.forEach(function(data){
        displayMessage(data);
    });

    chat.scrollTop = chat.scrollHeight;
});

    </script>

</body>
</html>
