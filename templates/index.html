<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #ffffff;
    color: rgb(88, 0, 0);
}

/* HEADER */
.header {
    background: #570000;
    padding: 12px;
    text-align: center;
    font-size: 16px;
}

/* CHAT */
#chat {
    height: calc(100vh - 160px);
    overflow-y: auto;
    padding: 10px;
    padding-bottom: 80px; /* 👈 IMPORTANT */
    display: flex;
    flex-direction: column;
}

/* MESSAGES */
.message {
    max-width: 80%;
    padding: 12px;
    margin: 4px;
    border-radius: 15px;
    font-size: 15px;
}

.me {
    align-self: flex-end;
    background: #570000;
}

.other {
    align-self: flex-start;
    background: #b90000;
}

/* INPUT BAR (style WhatsApp) */
.input-bar {
    width: 100%;
    display: flex;
    background: #000e24;
    padding: 8px;
    box-sizing: border-box;
}

#msg {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    border: none;
    font-size: 16px;
    outline: none;
}

button {
    margin-left: 5px;
    padding: 12px;
    border-radius: 50%;
    border: none;
    background: #8ad400;
    color: white;
    font-size: 16px;
}

</style>
</head>

<body>

<div class="header">💬 Chat - {{ session.user }}</div>
<div id="status">🟢 0 en ligne</div>

<style>
    #onlineUsers {
        font-size: 12px;
        color: #12d600;
        text-align: center;
        margin-bottom: 5px;
    }
    </style>

<div id="onlineUsers"></div>  <!-- 👈 ICI -->

<div id="chat"></div>

<input id="msg" placeholder="Message..." onkeypress="if(event.key==='Enter') send()">

<!-- Demande du nom UNE FOIS -->

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
    var socket = io();
    var chat = document.getElementById("chat");
    
    /* SEND */
    function send(){
        let msg = document.getElementById("msg").value;
        if(msg.trim() === "") return;
    
        socket.send(msg);
        document.getElementById("msg").value = "";
    }
    
    /* RECEIVE MESSAGE */
    socket.on("message", function(data){
        let parts = data.split("|");
        let name = parts[0];
        let msg = parts[1];
    
        let div = document.createElement("div");
        div.classList.add("message");
    
        // récupérer TON nom depuis Flask
        let myName = "{{ session.user }}";
    
        if(name === myName){
            div.classList.add("me");
        } else {
            div.classList.add("other");
        }
    
        div.innerHTML = "<b>" + name + ":</b> " + msg;
    
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    });
    
    /* USERS ONLINE */
    socket.on('users', function(list){
        let div = document.getElementById("onlineUsers");
        div.innerHTML = "👥 " + list.join(" | ");
    
        document.getElementById("status").innerText = "🟢 " + list.length + " en ligne";
    });
    </script>

</body>
</html>
