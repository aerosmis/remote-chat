<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css?v=3">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>
    
    body::before,
.login-box::before {
    pointer-events: none !important;
}

body {
    margin: 0;
    font-family: Arial;
    background: url("/static/bg4.gif?v=2");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    
}

/* CARD */
.login-box {
    background: rgba(255, 255, 255, 0.06);
    
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);

    border-radius: 20px;
    padding: 30px;

    border: 1px solid rgba(255, 255, 255, 0.18);

    box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.37),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);

    position: relative;
    width: 90%;
    max-width: 350px;
    text-align: center;
    
}

/* TITLE */
.login-box h2 {
    margin-bottom: 10px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.151);
    
    font-size: 16px;
    box-sizing: border-box;
    outline: none;

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    color: white;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;

    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.2);

    font-size: 16px;
    cursor: pointer;

    background: rgba(255, 255, 255, 0.25);
    transform: scale(1.02);
    backdrop-filter: blur(12px) saturate(180%);
    -webkit-backdrop-filter: blur(12px) saturate(180%);

    color: white;

    box-shadow: 
        0 4px 20px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);

    transition: 0.2s;
}

.avatar-select {
    backdrop-filter: blur(15px) saturate(180%);
    -webkit-backdrop-filter: blur(15px) saturate(180%);

    border-radius: 20px;

    background: rgba(255,255,255,0.08); /* 👈 comme ton header */

    border: 1px solid rgba(255,255,255,0.15);

    box-shadow: 
        0 4px 20px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.2);

    display: grid;
    grid-template-columns: repeat(auto-fill, 60px);
    gap: 10px;
    justify-content: center;
    margin: 15px 0;

    max-height: 150px;
    overflow-y: auto;
    padding: 10px;

    clip-path: inset(0 round 20px);

}

/* scrollbar stylée */
.avatar-select::-webkit-scrollbar {
    width: 6px;
}

.avatar-select::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
}

.avatar-select img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    cursor: pointer;
    transition: 0.2s;
    opacity: 0.6;
}

.avatar-select input {
    display: none;
}

.avatar-select input:checked + img {
    transform: scale(1.1); /* 👈 moins violent */
    opacity: 1;

    border: 1px solid rgba(255,255,255,0.3); /* 👈 contour propre */

    box-shadow: 
        0 0 6px rgba(255,255,255,0.4),   /* glow léger */
        inset 0 0 4px rgba(255,255,255,0.2); /* effet glass */

    backdrop-filter: blur(10px);
}

.avatar-select img:hover {
    transform: scale(1.1);
    opacity: 1;
}

.login-box h2 {
    color: white;
    text-align: center;
    margin-bottom: 20px;

    text-shadow: 0 0 10px rgba(255,255,255,0.3);
    
}

/* HOVER */
button:hover {
    background: #284c6450;
}



</style>
</head>

<body>

<form method="POST" class="login-box">
    <h2>Connexion</h2>

    <input type="text" name="username" placeholder="Nom d'utilisateur" required>
    <input type="password" name="password" placeholder="Mot de passe" required>

    <div class="avatar-select">
        {% for avatar in avatars %}
            <label>
                <input type="radio" name="avatar" value="{{ avatar }}" required>
                <img src="/static/avatars/{{ avatar }}">
            </label>
        {% endfor %}
    </div>

    <button type="submit">Se connecter</button>
</form>

</body>

</script>

</html>
